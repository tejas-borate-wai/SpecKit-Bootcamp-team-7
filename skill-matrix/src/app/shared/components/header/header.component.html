<mat-toolbar class="header-toolbar">
  <div class="header-left">
    <button mat-icon-button class="hamburger-btn" (click)="toggleSidebar.emit()"
            aria-label="Toggle navigation menu">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="logo">Skill Matrix</span>
    <span class="page-title">{{ pageTitle }}</span>
  </div>

  <div class="header-center">
    <app-global-search></app-global-search>
  </div>

  <div class="header-right">
    <button mat-icon-button routerLink="/notifications"
            aria-label="Notifications"
            [matBadge]="3" matBadgeColor="warn" matBadgeSize="small">
      <mat-icon>notifications</mat-icon>
    </button>

    @if (user$ | async; as user) {
      <button mat-button [matMenuTriggerFor]="userMenu" class="avatar-btn">
        <app-avatar [avatarUrl]="user.avatarUrl" [name]="user.name" [size]="36"></app-avatar>
      </button>

      <mat-menu #userMenu="matMenu" xPosition="before">
        <div class="user-menu-header" mat-menu-item disabled>
          <strong>{{ user.name }}</strong>
          <span class="role-badge" [class]="'role-' + user.role.toLowerCase()">{{ user.role }}</span>
        </div>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    }
  </div>
</mat-toolbar>

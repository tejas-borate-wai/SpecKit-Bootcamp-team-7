<div class="edit-page">
  <div class="page-header">
    <button mat-icon-button (click)="onCancel()"><mat-icon>arrow_back</mat-icon></button>
    <h1 class="page-title">Edit Skill Rating</h1>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSave()">
      <div class="form-section">
        <label class="field-label">Your Self Rating</label>
        <mat-radio-group formControlName="selfRating" class="rating-group">
          <mat-radio-button [value]="1">1 — Beginner</mat-radio-button>
          <mat-radio-button [value]="2">2 — Intermediate</mat-radio-button>
          <mat-radio-button [value]="3">3 — Advanced</mat-radio-button>
          <mat-radio-button [value]="4">4 — Expert</mat-radio-button>
        </mat-radio-group>
        @if (form.get('selfRating')?.invalid && form.get('selfRating')?.touched) {
          <mat-error>Please select a rating.</mat-error>
        }
      </div>

      <div class="actions">
        <button mat-button type="button" (click)="onCancel()">Cancel</button>
        <button mat-raised-button color="primary" type="submit"
                [disabled]="form.invalid || (loading$ | async)">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
